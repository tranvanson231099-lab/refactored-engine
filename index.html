
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VietFlex - Hướng dẫn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>XÁC NHẬN CÀI ĐẶT</h1>
        <p>Tiện ích đã được nhận diện. Hãy thực hiện bước cuối để kích hoạt giao diện:</p>
        <div class="step">
            <p>1. Chạy lệnh: <code>npm run build</code></p>
            <p>2. Quay lại <b>chrome://extensions</b></p>
            <p>3. Nhấn <b>Tải tiện ích đã giải nén</b></p>
            <p>4. CHỌN THƯ MỤC CON: <span class="highlight">vietflex/out</span></p>
        </div>
        <p style="font-size: 0.75rem; color: #64748b;">(Thư mục 'out' chứa mã nguồn đã xử lý sạch hoàn toàn lỗi CSP)</p>
    </div>
</body>
</html>
