
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VietFlex Engine - Chuyển hướng</title>
    <!-- Sử dụng meta refresh thay vì script để tránh lỗi CSP -->
    <meta http-equiv="refresh" content="0; url=out/index.html">
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f1f5f9; color: #1e293b; text-align: center; }
        .box { padding: 2rem; background: white; border-radius: 1rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 2px solid #3b82f6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đang khởi động VietFlex...</h2>
        <div class="loader"></div>
        <p>Nếu trang không tự chuyển, hãy chạy <b>npm run build</b> và nạp lại tiện ích.</p>
    </div>
</body>
</html>
